<!doctype html>
<html lang="en">
 <head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>GAwedding2026</title>
   <!-- CSS -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
   <link rel="stylesheet" href="/css/all.css">

   <!-- Google Fonts -->
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Chiron+Sung+HK:ital,wght@0,200..900;1,200..900&family=Italiana&family=Monsieur+La+Doulaise&display=swap" rel="stylesheet">

 </head>
 <body>
  <div id="hero" class="w-100">
    <div class="container container-md container-xl pt-8 pb-7">
      <div class="row">
        <div class="col-12 col-md-6">
          <img src="/images/fxn 2025-12-03 193727.901.JPG" alt="" class="pt-6 pb-2">
        </div>        
        <div class="col-12 col-md-6">
          <div class="col-12 title italiana-regular">Save<br><span>the </span>Date</div>
          <div class="col-12 subtitle italiana-regular">Gustavo & Amber</div>
          <div class="col-12 text-center fs-1 monsieur-la-doulaise-regular">welcome to our wedding</div>
        </div>
      </div>
    </div>
  </div>
  <div id="wedding" class="w-100 pb-4">
    <div class="container container-md container-xl pt-6 pb-6 text-center">
      <img src="/images/ba9851c3c22cd980.png" alt="" class="col-12">
      <div class="row p-5">
        <div class="col-6">
          <div class="rol fs-4 monsieur-la-doulaise-regular">groom</div>
          <div class="name fs-3 pb-3 chiron-sung-hk">吳孟蒼</div>
          <div class="rol fs-4 monsieur-la-doulaise-regular">host</div>
          <div class="name fs-6 chiron-sung-hk">羅宇秀</div>
        </div>
        <div class="col-6">
          <div class="rol fs-4 monsieur-la-doulaise-regular">bride</div>
          <div class="name fs-3 pb-3 chiron-sung-hk">林冠伃</div>
          <div class="rol fs-4 monsieur-la-doulaise-regular">host</div>
          <div class="name fs-6 chiron-sung-hk">林正宏　吳惠珠</div>
        </div>
      </div>
      <p class="b pt-4 pb-3 chiron-sung-hk">誠摯邀請<br>陪伴我們走過許多歲月的親人、朋友<br>出席並見證我們的幸福時刻</p>
      <p class="c times-new-roman">INVITED YOU TO SHARE JOY AT THE CELEBRATION<br>OF OUR WEDDING.</p>
      <div class="gallery pt-5">
        <div class="row">
        <div class="col-8"><img src="/images/fxn 2025-12-03 144948.151.JPG" alt=""></div>
        <div class="col-6 sticky"><img src="/images/fxn 2025-12-03 115126.798.JPG" alt=""></div>   
        </div>
      </div>
    </div>
  </div>
  <div id="day" class="w-100">
    <div class="container container-md container-xl pt-6 pb-6">
      <div class="row">
        <div class="col-6 date">
          <div class="row">
            <div class="col month italiana-regular">10</div>
            <div class="col week italiana-regular">SAT.</div>
          </div>
          <div class=""></div>
        </div>
        <div class="col-6 time"></div>
      </div>
    </div>
  </div>
     <!-- Javascript --> 
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
   <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

</html>
